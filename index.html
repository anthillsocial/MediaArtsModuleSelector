<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Module Selector - Permalink Dataset</title>
<style>
:root {
  --mod-header-color: #748f94;
  --mod-header-grey: #bbb;
  --mod-title-color: #334549;
  --mod-title-grey: #aaa;
}

body {
  font-family: system-ui, sans-serif;
  background:#f4f4f9;
  margin:0;
}

.container {
  max-width:1100px;
  margin:0 auto 1.2rem auto;
  background:#fff;
  padding:0.7em 0.5em 0.6em 0.5em;
  border-radius:0.7em;
  box-shadow:0 1px 8px #0001;
}

.top-bar {
  display:flex;
  align-items:center;
  gap:1em;
  margin-bottom:0.8em;
}

.dataset-select { margin-bottom:0; }

select {
  font-size:1em;
  padding:0.15em 0.5em;
}

.modules-blocks {
  display:flex;
  gap:0.7em;
  margin-bottom:0.7em;
  align-items:flex-start;
}

.modules-block {
  background:#f8fafd;
  padding:0.4em 0.35em 0.2em 0.35em;
  border-radius:0.4em;
  box-shadow:0 1px 2px #0001;
  flex:1 1 0;
  min-width:180px;
}

.block-title {
  font-size:0.98em;
  margin-bottom:0.23em;
  color:#223366;
  font-weight:bold;
  text-align:center;
  padding-bottom:0.1em;
  border-bottom:1px solid #dde3f6;
  margin-top:0;
}

.module-list {
  display:flex;
  flex-direction:column;
  gap:0.32em;
}

.module-card {
  background:#f6f8fb;
  border:0.6px solid #dde3f6;
  border-radius:0.28em;
  padding:0.10em 0.40em 0.08em 0.40em;
  cursor:pointer;
  transition:background 0.13s, border-color 0.13s, color 0.09s;
  font-size:0.95em;
  user-select:none;
  font-weight:500;
  display:flex;
  flex-direction:column;
  gap:0.15em;
}

.module-card.core {
  background:#e2eeff;
  border-color:#3896fa;
  color:#123470;
}

.module-card.selected {
  background:#aaf2bc;
  border-color:#20ba55;
  color:#14522c;
}

.module-card.disabled {
  background:#ededed;
  color:var(--mod-header-grey);
  cursor:not-allowed;
  border-style:dashed;
}

/* ===== GRID ROW BASE ===== */
.module-card .mod-row {
  display:grid;
  align-items:center;
  width:100%;
  gap:0.3em;
}

/* First row: code / type / credits */
.module-card .mod-row:first-child {
  grid-template-columns:minmax(0,1fr) minmax(0,1fr) auto;
  white-space:nowrap;
}

/* Second row: title + right-aligned view link */
.module-card .mod-row:last-child {
  grid-template-columns:minmax(0,1fr) auto;
  align-items:start;
}

.module-card .code {
  font-size:0.89em;
  font-weight:bold;
  color:var(--mod-header-color);
  white-space:nowrap;
}

.module-card .mod-type {
  font-size:0.78em;
  color:var(--mod-header-color);
  opacity:0.7;
  text-transform:capitalize;
}

.module-card .credit {
  font-size:0.81em;
  color:var(--mod-header-color);
  justify-self:end;
  text-align:right;
  white-space:nowrap;
}

.module-card .mod-title {
  font-size:0.85em;
  font-weight:400;
  color:var(--mod-title-color);
  line-height:1.2;
  margin:0;
  min-width:0;
  overflow:hidden;
  text-overflow:ellipsis;
  word-break:break-word;
}

.module-card .view-link {
  font-size:0.78em;
  white-space:nowrap;
  margin-left:0.5em;
  align-self:flex-end;
}

.module-card .view-link a {
  color:var(--mod-header-color);
  text-decoration:none;
  border:0.6px solid var(--mod-header-color);
  border-radius:0.2em;
  padding:0.05em 0.35em;
  opacity:0.75;
  transition:opacity 0.12s, background 0.12s;
}

.module-card .view-link a:hover {
  opacity:1;
  background:rgba(116,143,148,0.12);
  text-decoration:none;
}

.warning {
  background:#e5f3ff;
  color:#23577e;
  padding:0.43em 0.9em;
  border-radius:0.47em;
  margin-bottom:0.7em;
  border:1px solid #b1d3e6;
  font-size:1em;
  display:inline-block;
}

.status-bar {
  background:#f2f6ff;
  border-radius:0.26em;
  padding:0.37em 0.48em;
  font-size:0.93em;
  color:#234;
  display:inline-block;
}

.current-selection {
  background:#f8f9fd;
  border-radius:0.4em;
  padding:0.5em 0.6em;
  box-shadow:0 1px 2px #0001;
  margin-top:0.7em;
  font-size:0.94em;
}

/* ===== IFRAME MODAL ===== */
.iframe-modal {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.6);
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 9999;
}

.iframe-modal.active {
  display: flex;
}

.iframe-inner {
  width: 90%;
  height: 90%;
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  box-shadow: 0 8px 40px rgba(0,0,0,0.35);
}

.iframe-toolbar {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0.45em 0.8em;
  background: #f0f2f7;
  border-bottom: 1px solid #dde3f6;
  gap: 0.5em;
}

.iframe-title {
  font-size: 0.93em;
  font-weight: 600;
  color: #334549;
  flex: 1;
  overflow: hidden;
  text-overflow: ellipsis;
  white-space: nowrap;
}

.iframe-close {
  padding: 0.3em 0.9em;
  border: none;
  background: #d0d6e8;
  border-radius: 0.3em;
  cursor: pointer;
  font-size: 0.9em;
  color: #223;
  transition: background 0.13s;
}

.iframe-close:hover {
  background: #b0b8d0;
}

#iframe-modal iframe {
  flex: 1;
  width: 100%;
  border: none;
}

@media (max-width:950px) {
  .modules-blocks { flex-direction:column; }
  .top-bar { flex-direction:column; align-items:stretch; }
}
</style>
</head>
<body>
  <div class="container">
    <div class="top-bar">
      <div class="dataset-select">
        <select id="dataset">
          <option value="DMCT/Y1.csv?v4">Year 1: All Core Modules</option>
          <!---Y2 Proposal--->
          <option value="DMCT/Y2.csv?v4">Year 2</option>
          <!---Y3 Proposal--->
          <option value="DMCT/Y3.csv?v4">Year 3</option>
        </select>
      </div>
      <div class="status-bar" id="status-bar"></div>
    </div>
    <div id="csv-error"></div>
    <div id="warnings"></div>
    <div class="modules-blocks">
      <div class="modules-block">
        <div class="block-title">Autumn + Spring</div>
        <div class="module-list" id="autumnspring-list"></div>
      </div>
      <div class="modules-block">
        <div class="block-title">Autumn Only</div>
        <div class="module-list" id="autumn-list"></div>
      </div>
      <div class="modules-block">
        <div class="block-title">Spring Only</div>
        <div class="module-list" id="spring-list"></div>
      </div>
    </div>
    <div class="current-selection" id="current-selection"></div>
  </div>

  <!-- IFRAME MODAL -->
  <div id="iframe-modal" class="iframe-modal">
    <div class="iframe-inner">
      <div class="iframe-toolbar">
        <span class="iframe-title" id="iframe-modal-title"></span>
        <button class="iframe-close" onclick="closeIframe()">✕ Close</button>
      </div>
      <iframe id="module-iframe" src="" frameborder="0"></iframe>
    </div>
  </div>

<script>
// ===== MODAL HELPERS =====
function openInIframe(url, title) {
  const modal = document.getElementById("iframe-modal");
  const iframe = document.getElementById("module-iframe");
  const titleEl = document.getElementById("iframe-modal-title");
  iframe.src = url;
  if (titleEl) titleEl.textContent = title || url;
  modal.classList.add("active");
}

function closeIframe() {
  const modal = document.getElementById("iframe-modal");
  const iframe = document.getElementById("module-iframe");
  iframe.src = "";
  modal.classList.remove("active");
}

// Close modal when clicking the backdrop
document.addEventListener("DOMContentLoaded", () => {
  document.getElementById("iframe-modal").addEventListener("click", function(e) {
    if (e.target === this) closeIframe();
  });

  // Close on Escape key
  document.addEventListener("keydown", e => {
    if (e.key === "Escape") closeIframe();
  });
});

// ===== URL helpers (used for the view link) =====
// Edit this function to produce the correct URL for the module pages
// Legacy function, may use in future
function modulePageURL(module) {
  // Example: adjust the base URL to wherever your module pages live
  return `https://www.example.ac.uk/modules/${encodeURIComponent(module.code)}`;
}

// ===== DATASET / PERMALINK =====
let selectorInstance = null;

async function loadModulesFromFile(csvFile) {
  document.getElementById('csv-error').textContent = '';
  try {
    const resp = await fetch(csvFile);
    if (!resp.ok) throw new Error(`Could not load ${csvFile}: ${resp.statusText}`);
    const csvData = await resp.text();
    if (selectorInstance) selectorInstance.destroy();
    const modules = parseCSV(csvData);
    selectorInstance = new ModuleSelector(modules);
  } catch (err) {
    document.getElementById('csv-error').textContent = err.message;
    document.getElementById('status-bar').innerHTML = '';
  }
}

function setDatasetInURL(value) {
  const url = new URL(window.location);
  url.searchParams.set('dataset', value);
  window.history.replaceState({}, '', url);
}

function getDatasetFromURL(defaultValue) {
  const params = new URLSearchParams(window.location.search);
  return params.get('dataset') || defaultValue;
}

document.addEventListener("DOMContentLoaded", () => {
  const datasetSelect = document.getElementById("dataset");
  const urlDataset = getDatasetFromURL(null);

  if (urlDataset) {
    // Find matching option, ignoring query strings like ?v2
    const urlBase = urlDataset.split("?")[0];
    const match = Array.from(datasetSelect.options).find(opt =>
      opt.value.split("?")[0] === urlBase
    );
    if (match) datasetSelect.value = match.value;
  }

  loadModulesFromFile(datasetSelect.value);

  datasetSelect.addEventListener("change", (e) => {
    const selectedValue = e.target.value;
    setDatasetInURL(selectedValue.split("?")[0]); // store clean URL without ?v2
    loadModulesFromFile(selectedValue);
  });
});  

// ===== CSV PARSER =====
function parseCSV(data) {
const [header, ...rows] = data.trim().split("\n");
const keys = header.split(",").map(k => k.trim());
return rows
  .filter(row => row.replace(/,/g, '').trim() !== '')
  .map(row => {
      let vals = [];
      let curr = "", inQuotes = false;
      for (let i = 0; i < row.length; ++i) {
        let ch = row[i];
        if (ch === '"') { inQuotes = !inQuotes; continue; }
        if (ch === "," && !inQuotes) { vals.push(curr.trim()); curr = ""; }
        else curr += ch;
      }
      vals.push(curr.trim());
      let obj = {};
      keys.forEach((k, idx) => obj[k] = (vals[idx] || ""));
      ["exclude", "group"].forEach(key => {
        obj[key] = obj[key]
          ? obj[key].split(/[,/]/).map(s => s.trim()).filter(Boolean)
          : [];
      });
      obj.credits = Number(obj.credits);
      obj.term = obj.term.trim();
      obj.core = obj.core.trim();
      obj.or = obj.or.trim();
      obj.type = obj.type.trim();
      obj.moodleUrl = obj.moodleUrl.trim();
      return obj;
    });
}

function termsForModule(mod) {
  if (/Autumn\+Spring/i.test(mod.term)) return ["AutumnSpring"];
  if (/Autumn/i.test(mod.term) && !/Spring/i.test(mod.term)) return ["Autumn"];
  if (/Spring/i.test(mod.term) && !/Autumn/i.test(mod.term)) return ["Spring"];
  return [];
}

// ===== MODULE SELECTOR CLASS =====
class ModuleSelector {
  constructor(modules) {
    this.modules = modules;
    this.selected = new Set();
    this.creditByTerm = { Autumn: 0, Spring: 0 };
    this.exclusions = {};
    this.groupMap = {};
    this.codeMap = {};

    this.orGroups = this.getOrGroups();
    const codesInOrCore = new Set(this.orGroups.flat().filter(code =>
      this.modules.find(m => m.code === code && m.core === 'core')
    ));

    modules.forEach(m => {
      this.codeMap[m.code] = m;
      m.exclude.forEach(e => {
        this.exclusions[m.code] = this.exclusions[m.code] || [];
        this.exclusions[m.code].push(e);
      });
      m.group.forEach(g => {
        this.groupMap[m.code] = this.groupMap[m.code] || [];
        this.groupMap[m.code].push(g);
      });
      if (m.core === 'core' && !codesInOrCore.has(m.code)) {
        this.selectModule(m.code);
      }
    });

    this.statusBar = document.getElementById("status-bar");
    this.warnings = document.getElementById("warnings");
    this.autumnSpringList = document.getElementById("autumnspring-list");
    this.autumnList = document.getElementById("autumn-list");
    this.springList = document.getElementById("spring-list");
    this.selectedList = document.getElementById("current-selection");

    this.renderGrid();
    this.updateStatus();
    this.updateSelectedList();
  }

  destroy() {
    this.statusBar.innerHTML = '';
    this.warnings.innerHTML = '';
    this.autumnSpringList.innerHTML = '';
    this.autumnList.innerHTML = '';
    this.springList.innerHTML = '';
    this.selectedList.innerHTML = '';
  }

  getOrGroups() {
    let groups = {};
    this.modules.forEach(m => {
      if (m.or) {
        const ids = m.or.split("/").map(s => s.trim());
        if (ids.length > 1) groups[m.or] = ids;
      }
    });
    return Object.values(groups);
  }

  requireOrCoreSelection() {
    for (let group of this.orGroups) {
      if (group.some(code => this.codeMap[code].core === "core")) {
        if (!group.some(code => this.selected.has(code))) return group;
      }
    }
    return null;
  }

  canSelect(module) {
    if (this.selected.has(module.code)) return true;
    const requiredOr = this.requireOrCoreSelection();
    if (requiredOr && !requiredOr.includes(module.code)) return false;

    for (let sel of this.selected) {
      const selMod = this.codeMap[sel];
      if (selMod.exclude.includes(module.code) || module.exclude.includes(sel)) return false;
    }

    let candidateCodes = this.findGroupMembers(module.code).filter(c => !this.selected.has(c));
    let candidateModules = candidateCodes.map(code => this.codeMap[code]);
    let tempCredit = { ...this.creditByTerm };

    for (const m of candidateModules) {
      let tFor = [];
      if (/Autumn\+Spring/i.test(m.term)) tFor = ["Autumn", "Spring"];
      else if (/Autumn/i.test(m.term) && !/Spring/i.test(m.term)) tFor = ["Autumn"];
      else if (/Spring/i.test(m.term) && !/Autumn/i.test(m.term)) tFor = ["Spring"];
      tFor.forEach(term => {
        tempCredit[term] = (tempCredit[term] || 0) + m.credits / tFor.length;
      });
    }
    if (tempCredit.Autumn > 60 || tempCredit.Spring > 60) return false;
    return true;
  }

  findGroupMembers(code) {
    const visited = new Set();
    const toVisit = [code];
    while (toVisit.length > 0) {
      const current = toVisit.pop();
      if (visited.has(current)) continue;
      visited.add(current);
      const currMod = this.codeMap[current];
      if (!currMod) continue;
      for (const target of currMod.group) {
        const targetMod = this.codeMap[target];
        if (!targetMod) continue;
        const mutual = targetMod.group.includes(current);
        if (mutual || current === code) {
          if (!visited.has(target)) toVisit.push(target);
        }
      }
    }
    return Array.from(visited);
  }

  handleModuleClick(module, e) {
    // Don't toggle selection if the View link was clicked
    if (e.target.closest('.view-link')) return;
    e.preventDefault();
    if (!this.selected.has(module.code) && !this.canSelect(module)) return;
    if (this.selected.has(module.code)) {
      if (module.core === "core") return;
      this.deselectModule(module.code, true);
    } else {
      this.selectModule(module.code, true);
    }
    this.updateStatus();
    this.updateSelectedList();
    this.renderGrid();
  }

  selectModule(code, recurse = false) {
    if (this.selected.has(code)) return;
    const groupMembers = this.findGroupMembers(code);
    for (const c of groupMembers) {
      const mod = this.codeMap[c];
      if (!mod || this.selected.has(c)) continue;
      this.selected.add(c);
      const isSplit = /Autumn\+Spring/i.test(mod.term);
      const terms = isSplit ? ["Autumn", "Spring"]
        : /Autumn/i.test(mod.term) ? ["Autumn"]
        : ["Spring"];
      terms.forEach(t => this.creditByTerm[t] += mod.credits / terms.length);
    }
    for (let group of this.orGroups) {
      if (group.includes(code)) {
        group.forEach(other => { if (other !== code) this.deselectModule(other); });
      }
    }
  }

  deselectModule(code, recurse = false) {
    if (!this.selected.has(code)) return;
    const allGroupMembers = this.findGroupMembers(code);
    allGroupMembers.forEach(c => {
      if (this.selected.has(c)) {
        if (c !== code) this.deselectModule(c, true);
        else {
          const mod = this.codeMap[c];
          this.selected.delete(c);
          let tFor = [];
          if (/Autumn\+Spring/i.test(mod.term)) tFor = ["Autumn", "Spring"];
          else if (/Autumn/i.test(mod.term) && !/Spring/i.test(mod.term)) tFor = ["Autumn"];
          else if (/Spring/i.test(mod.term) && !/Autumn/i.test(mod.term)) tFor = ["Spring"];
          tFor.forEach(term => {
            this.creditByTerm[term] -= mod.credits / tFor.length;
          });
        }
      }
    });
  }

  renderGrid() {
    this.autumnSpringList.innerHTML = "";
    this.autumnList.innerHTML = "";
    this.springList.innerHTML = "";

    const createCard = module => {
      const isAutumnSpring = /Autumn\+Spring/i.test(module.term);
      const creditLabel = isAutumnSpring
        ? `${module.credits}<sup class="split-credit">(${module.credits/2}+${module.credits/2})</sup> credit`
        : `${module.credits} credit`;

      const viewURL = "/MODULES/"+module.code+".html";
      //"https://moodle.royalholloway.ac.uk/mod/page/view.php?id=1229618&inpopup=1"; //modulePageURL(module);

      const card = document.createElement("div");
      card.className = "module-card";
      if (this.selected.has(module.code)) {
        card.classList.add("selected");
      } else if (module.core === 'core') {
        card.classList.add("core");
      }
      if (!this.canSelect(module) && !this.selected.has(module.code)) card.classList.add("disabled");

      card.innerHTML = `
        <div class="mod-row">
          <span class="code">${module.code}</span>
          <span class="mod-type">${module.type}</span>
          <span class="credit">${creditLabel}</span>
        </div>
        <div class="mod-row">
          <span class="mod-title">${module.name}</span>
          <span class="view-link">
            ${module.moodleUrl
              ? `<a href="${module.moodleUrl}"
                   title="View module details for ${module.name}"
                   onclick="event.stopPropagation(); window.open('${module.moodleUrl}', 'moduleViewer', 'width=1000,height=700');return false;">
                   View
                 </a>`
              : `<a href="${viewURL}"
                   title="View module details for ${module.name}"
                   onclick="event.stopPropagation(); openInIframe('${viewURL}', '${module.code} \u2013 ${module.name.replace(/'/g, "\\'")}'); return false;">
                   View
                 </a>`
            }
          </span>
        </div>
      `;
      card.addEventListener("click", this.handleModuleClick.bind(this, module));
      return card;
    };

    this.modules.forEach(module => {
      const terms = termsForModule(module);
      if (terms.includes("AutumnSpring")) this.autumnSpringList.appendChild(createCard(module));
      if (terms.includes("Autumn")) this.autumnList.appendChild(createCard(module));
      if (terms.includes("Spring")) this.springList.appendChild(createCard(module));
    });
  }

  updateStatus() {
    let statusMsg = `
      <b>Autumn:</b> ${this.creditByTerm.Autumn || 0}/60 credits &nbsp; | &nbsp;
      <b>Spring:</b> ${this.creditByTerm.Spring || 0}/60 credits
    `;
    const requiredOr = this.requireOrCoreSelection();
    this.warnings.innerHTML = "";
    if (requiredOr) {
      this.warnings.innerHTML = `<div class="warning">Please select one of: <b>${requiredOr.map(code => this.codeMap[code].name).join(" or ")}</b> to continue.</div>`;
    } else if ((this.creditByTerm.Autumn || 0) > 60 || (this.creditByTerm.Spring || 0) > 60) {
      this.warnings.innerHTML = `<div class="warning">Credit limit exceeded! Max 60 credits per term.</div>`;
    }
    this.statusBar.innerHTML = statusMsg;
  }

  updateSelectedList() {
    let html = "<h3>Current Selection</h3>";
    html += "Select your options and use the following list as a guide for filling in the form on Moodle.";
    if (!this.selected.size) {
      html += "<div>No modules selected.</div>";
    } else {
      html += "<ul>";
      Array.from(this.selected)
        .map(code => this.codeMap[code])
        .sort((a, b) => a.term.localeCompare(b.term) || a.name.localeCompare(b.name))
        .forEach(m => {
          html += `<li>${m.type.charAt(0).toUpperCase() + m.type.slice(1)} - ${m.name} (${m.code}) - ${m.credits} credit, ${m.term}</li>`;
        });
      html += "</ul>";
    }
    this.selectedList.innerHTML = html;
  }
}
</script>
</body>
</html>
